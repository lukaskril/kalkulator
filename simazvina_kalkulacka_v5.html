<!doctype html><html lang='cs'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Simazvina — kalkulačka</title><style>:root{--bg:#0b0b0b;--card:#151515;--text:#f5f5f5;--muted:#b5b5b5;--accent:#ff6f00;--border:#242424}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,Arial}.w{max-width:900px;margin:20px auto;padding:16px}.c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}.g{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:800px){.g{grid-template-columns:1fr}}label{font-weight:600;margin:6px 0;display:block}select{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:#0f0f0f;color:var(--text)}.row{display:flex;justify-content:space-between;margin:6px 0;gap:10px}.badge{font-size:12px;padding:4px 8px;border-radius:999px;background:#101010;border:1px solid var(--border);color:#bbb}.muted{color:var(--muted);font-size:13px}.div{height:1px;background:var(--border);margin:10px 0}.total{font-size:28px;font-weight:800}.accent{color:var(--accent)}.btn{background:var(--accent);color:#000;font-weight:800;border:none;border-radius:10px;padding:10px 14px;cursor:pointer}</style></head><body><div class='w'><h2>Orientační kalkulačka — Simazvina F1 Art</h2><div class='c'><div class='g'><div><label>Co chceš vytvořit?</label><select id='cat'><option value='sneakers' selected>Tenisky</option><option value='jacket'>Bunda</option><option value='bag'>Kabelka / doplněk</option><option value='canvas'>Obraz</option></select></div><div id='sizeWrap' style='display:none'><label>Velikost obrazu</label><select id='size'><option value='30x40' selected>30×40 cm</option><option value='40x50'>40×50 cm</option><option value='50x70'>50×70 cm</option></select></div></div><div class='g'><div><label>Náročnost</label><select id='cmp'><option value='simple'>Jednodušší</option><option value='standard' selected>Standard</option><option value='detailed'>Detailní</option></select></div><div><label>Počet motivů (piloti/auta)</label><select id='subj'><option value='1' selected>1</option><option value='2'>2</option><option value='3'>3</option></select></div></div><div class='g'><div><label>Easter eggs</label><select id='eggs'><option value='0' selected>Žádné</option><option value='1'>1–2</option><option value='2'>3–5</option><option value='3'>Více</option></select></div><div><label>Materiál dodá</label><select id='base'><option value='client' selected>Zákazník</option><option value='me'>Já zajistím</option></select></div></div><div class='g'><div><label>Termín</label><select id='rush'><option value='normal' selected>Standard</option><option value='rush'>Expres</option></select></div><div><label>Dodání</label><select id='ship'><option value='cz' selected>Česko/SK</option><option value='intl'>Zahraničí</option></select></div></div><div class='div'></div><div id='bd'></div><div class='row' style='align-items:center;margin-top:10px'><div class='total'>Orientačně: <span id='tot' class='accent'>0</span> Kč</div><button class='btn' id='copy'>Zkopírovat poptávku</button></div><div class='muted'>Poštovné dle dopravce/země (zvlášť). Finální cena po domluvě nad návrhem.</div></div></div><script>const el={cat:byId('cat'),sizeWrap:byId('sizeWrap'),size:byId('size'),cmp:byId('cmp'),subj:byId('subj'),eggs:byId('eggs'),base:byId('base'),rush:byId('rush'),ship:byId('ship'),bd:byId('bd'),tot:byId('tot'),copy:byId('copy')};function byId(i){return document.getElementById(i)}function fmt(n){return n.toLocaleString('cs-CZ')}function baseLabor(cat,cmp,size){const sneakers={simple:3800,standard:4500,detailed:5500};const jacket={simple:4800,standard:6000,detailed:7500};const bag={simple:2500,standard:3500,detailed:5200};const canvas={'30x40':{simple:5000,standard:6500,detailed:8000},'40x50':{simple:8000,standard:11000,detailed:13000},'50x70':{simple:9000,standard:10000,detailed:12000}};if(cat==='canvas')return canvas[(size||'30x40')][cmp];if(cat==='sneakers')return sneakers[cmp];if(cat==='jacket')return jacket[cmp];if(cat==='bag')return bag[cmp];return 0;}function recalc(){const cat=el.cat.value,cmp=el.cmp.value,size=el.size?el.size.value:'30x40';el.sizeWrap.style.display=(cat==='canvas')?'block':'none';const subjects=parseInt(el.subj.value,10),eggs=parseInt(el.eggs.value,10);const baseWho=el.base.value,rush=el.rush.value;let labor=baseLabor(cat,cmp,size);let extra=0;if(subjects>1){const per=(cmp==='detailed')?1200:(cmp==='standard'?800:500);extra=(subjects-1)*per;}const eggsAdd=[0,800,1600,2500][eggs];let material=0;if(baseWho==='me'){if(cat==='sneakers')material=1800;else if(cat==='jacket')material=1200;else if(cat==='bag')material=1000;}const rushAdd=rush==='rush'?Math.round(labor*0.2):0;const total=labor+extra+eggsAdd+material+rushAdd;el.bd.innerHTML=`<div class='row'><div class='badge'>Kategorie</div><div>${cat.toUpperCase()}${cat==='canvas'?' • '+size:''}</div></div><div class='row'><div class='badge'>Náročnost</div><div>${cmp}</div></div><div class='row'><div class='badge'>Motivy</div><div>${subjects}</div></div><div class='row'><div class='badge'>Easter eggs</div><div>${['0','1–2','3–5','víc detailních'][eggs]}</div></div><div class='row'><div class='badge'>Materiál</div><div>${baseWho==='me'?'zajistím já':'dodá zákazník'}</div></div><div class='row'><div class='badge'>Termín</div><div>${rush==='rush'?'expres':'standard'}</div></div><div class='muted'>Práce: ${fmt(labor)} Kč${extra?` • další motivy: ${fmt(extra)} Kč`:''}${eggsAdd?` • eggs: ${fmt(eggsAdd)} Kč`:''}${material?` • materiál: ${fmt(material)} Kč`:''}${rushAdd?` • expres: ${fmt(rushAdd)} Kč`:''}</div>`;el.tot.textContent=fmt(total);}['change','input'].forEach(ev=>{Object.values(el).forEach(x=>{if(x&&x.addEventListener)x.addEventListener(ev,recalc);});});recalc();el.copy.addEventListener('click',()=>{const text=`Poptávka – Simazvina F1 Art
Kategorie: ${el.cat.value}${el.cat.value==='canvas'?' ('+(el.size?el.size.value:'30x40')+')':''}
Náročnost: ${el.cmp.value}
Motivy: ${el.subj.value}
Easter eggs: ${['0','1–2','3–5','víc detailních'][parseInt(el.eggs.value||'0',10)]}
Materiál: ${el.base.value==='me'?'zajistí Simazvina':'dodám sám/sama'}
Termín: ${el.rush.value==='rush'?'expres':'standard'}
Orientační cena: ${el.tot.textContent} Kč`;navigator.clipboard.writeText(text).then(()=>{el.copy.textContent='Zkopírováno ✅';setTimeout(()=>el.copy.textContent='Zkopírovat poptávku',1300);});});</script></body></html>
